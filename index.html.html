<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Calendário Editorial — Studio Borges</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0b0f;
    --surface: #161218;
    --surface2: #1d1820;
    --border: #2a2230;
    --border2: #352840;
    --gold: #c9a96e;
    --gold-light: #e8cfa0;
    --gold-dim: #8a6d44;
    --white: #f0ece8;
    --muted: #7a6e7c;
    --muted2: #5a5060;
    --tag-cilios-bg: #1e1028; --tag-cilios: #c9a0f0;
    --tag-rel-bg: #0f1828; --tag-rel: #90b8f0;
    --tag-aut-bg: #0f2018; --tag-aut: #90d8b0;
    --tag-svc-bg: #1e1410; --tag-svc: #e8b880;
    --tag-bast-bg: #181818; --tag-bast: #c8c0a0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--white); font-family: 'DM Sans', sans-serif; font-weight: 300; line-height: 1.7; min-height: 100vh; }
  .page-header { padding: 3rem 2rem 2rem; border-bottom: 0.5px solid var(--border); max-width: 900px; margin: 0 auto; }
  .eyebrow { font-size: 11px; letter-spacing: 0.2em; color: var(--gold-dim); text-transform: uppercase; margin-bottom: 0.75rem; }
  h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.4rem; font-weight: 300; color: var(--white); line-height: 1.2; margin-bottom: 0.5rem; }
  h1 span { color: var(--gold); font-style: italic; }
  .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 2rem; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag { font-size: 10px; letter-spacing: 0.08em; padding: 3px 10px; border-radius: 20px; font-weight: 400; }
  .tag-cilios { background: var(--tag-cilios-bg); color: var(--tag-cilios); }
  .tag-rel { background: var(--tag-rel-bg); color: var(--tag-rel); }
  .tag-aut { background: var(--tag-aut-bg); color: var(--tag-aut); }
  .tag-svc { background: var(--tag-svc-bg); color: var(--tag-svc); }
  .tag-bast { background: var(--tag-bast-bg); color: var(--tag-bast); }
  .main { max-width: 900px; margin: 0 auto; padding: 2rem; display: flex; flex-direction: column; gap: 12px; }
  .post-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.2s; }
  .post-card:hover { border-color: var(--border2); }
  .post-header { display: grid; grid-template-columns: 40px 90px 1fr auto auto auto; align-items: center; gap: 12px; padding: 16px 20px; cursor: pointer; user-select: none; }
  .post-num { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 300; color: var(--gold-dim); font-style: italic; }
  .post-date { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }
  .post-title { font-size: 14px; font-weight: 400; color: var(--white); }
  .format-pill { font-size: 10px; padding: 2px 9px; border-radius: 20px; background: var(--surface2); color: var(--muted); border: 0.5px solid var(--border); white-space: nowrap; }
  .toggle-btn { font-size: 11px; color: var(--muted2); transition: color 0.2s; min-width: 16px; text-align: right; }
  .post-header:hover .toggle-btn { color: var(--gold-dim); }
  .post-body { display: none; border-top: 0.5px solid var(--border); padding: 20px; flex-direction: column; gap: 16px; }
  .post-body.open { display: flex; }
  .sections-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .section-block { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .section-block.full { grid-column: 1 / -1; }
  .section-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .section-label::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }
  .section-text { font-size: 13px; color: #b0a8b8; line-height: 1.8; white-space: pre-wrap; }
  .section-text b { color: var(--white); font-weight: 500; }
  .legenda-block { background: #100d12; border: 0.5px solid var(--border2); border-left: 2px solid var(--gold-dim); border-radius: 8px; padding: 16px 18px; font-size: 13.5px; color: #d0c8d8; line-height: 1.9; white-space: pre-wrap; }
  .script-block { background: #0d1018; border: 0.5px solid #1e2830; border-left: 2px solid #4a7aa0; border-radius: 8px; padding: 16px 18px; font-size: 13px; color: #a8c0d0; line-height: 1.85; white-space: pre-wrap; }
  @media (max-width: 640px) {
    .sections-grid { grid-template-columns: 1fr; }
    .post-header { grid-template-columns: 32px 1fr auto auto; }
    .post-date { display: none; }
    .format-pill { display: none; }
    h1 { font-size: 1.8rem; }
  }
</style>
</head>

    producao:`TIPO: Foto estática

    roteiro:null,
    legenda:`Se você chegou aqui agora, deixa eu me apresentar.\n\nSou a Kayllane, especialista em extensão de cílios e sobrancelhas aqui em Feira de Santana. Trabalho sozinha, em espaço próprio, e é exatamente assim que eu gosto. Porque quando você chega aqui, toda a minha atenção é só sua.\n\nNão tem pressa, não tem distração. Tem cuidado de verdade, do começo ao fim.\n\nSe você ainda não me conhece, que bom que chegou até aqui. E se você já é cliente, sabe exatamente do que eu tô falando 🤍\n\nMe conta nos comentários: como você me encontrou?`

    roteiro:null,

    roteiro:`SLIDE 1 — CAPA

[Foto da Kayllane]

    roteiro:`SLIDE 1 — CAPA

const main = document.getElementById('main');
posts.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'post-card';
  const hasRoteiro = p.roteiro !== null;
  card.innerHTML = `
    <div class="post-header" onclick="toggle(${i})">
      <span class="post-num">${p.num}</span>
      <span class="post-date">${p.date}</span>
      <span class="post-title">${p.title}</span>
      <span class="tag ${p.tag}">${p.tagLabel}</span>
      <span class="format-pill">${p.formato}</span>
      <span class="toggle-btn" id="btn-${i}">↓</span>
    </div>
    <div class="post-body" id="body-${i}">
      <div class="sections-grid">
        <div class="section-block">
          <div class="section-label">Objetivo do post</div>
          <div class="section-text">${p.objetivo}</div>
        </div>
        <div class="section-block">
          <div class="section-label">Como produzir a foto / vídeo</div>
          <div class="section-text">${p.producao}</div>
        </div>
        ${hasRoteiro ? `
        <div class="section-block full">
          <div class="section-label">Roteiro de conteúdo</div>
          <div class="script-block">${p.roteiro}</div>
        </div>` : ''}
        <div class="section-block full">
          <div class="section-label">Legenda pronta</div>
          <div class="legenda-block">${p.legenda}</div>
        </div>
      </div>
    </div>
  `;
  main.appendChild(card);
});

function toggle(i) {
  const body = document.getElementById('body-' + i);
  const btn = document.getElementById('btn-' + i);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  btn.textContent = isOpen ? '↓' : '↑';
}
</script>
</body>
</html>
