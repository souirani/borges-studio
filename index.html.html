<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário Editorial — Studio Borges</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ffffff;
    color: #1a1a1a;
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    line-height: 1.7;
  }

  .page-header {
    padding: 3rem 2rem 2rem;
    border-bottom: 1px solid #ebebeb;
    max-width: 960px;
    margin: 0 auto;
  }

  .eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: #aaa;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  h1 {
    font-size: 1.9rem;
    font-weight: 700;
    color: #111;
    line-height: 1.2;
    margin-bottom: 0.4rem;
  }

  .subtitle {
    font-size: 13px;
    font-weight: 400;
    color: #888;
    margin-bottom: 1.8rem;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 3px 11px;
    border-radius: 20px;
  }

  .tag-cilios   { background: #f3eeff; color: #7c4fcf; }
  .tag-rel      { background: #eef4ff; color: #3b6fd4; }
  .tag-aut      { background: #eefbf3; color: #2a9455; }
  .tag-svc      { background: #fff7ee; color: #c97030; }
  .tag-bast     { background: #f5f5f5; color: #666; }

  .main {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .post-card {
    border: 1px solid #e8e8e8;
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: #fff;
  }

  .post-card:hover {
    border-color: #ccc;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  }

  .post-header {
    display: grid;
    grid-template-columns: 36px 96px 1fr auto auto auto;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
  }

  .post-num {
    font-size: 13px;
    font-weight: 700;
    color: #bbb;
  }

  .post-date {
    font-size: 11px;
    font-weight: 400;
    color: #aaa;
  }

  .post-title {
    font-size: 14px;
    font-weight: 600;
    color: #111;
  }

  .format-pill {
    font-size: 10px;
    font-weight: 400;
    padding: 2px 9px;
    border-radius: 20px;
    background: #f5f5f5;
    color: #888;
    border: 1px solid #eee;
    white-space: nowrap;
  }

  .toggle-btn {
    font-size: 14px;
    color: #ccc;
    transition: color 0.2s;
  }

  .post-header:hover .toggle-btn { color: #888; }

  .post-body {
    display: none;
    border-top: 1px solid #f0f0f0;
    padding: 20px;
    flex-direction: column;
    gap: 16px;
    background: #fafafa;
  }

  .post-body.open { display: flex; }

  /* Visual reference strip */
  .ref-strip {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 4px;
  }

  .ref-strip::-webkit-scrollbar { height: 4px; }
  .ref-strip::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 2px; }
  .ref-strip::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

  .ref-img-wrap {
    flex-shrink: 0;
    width: 130px;
    height: 130px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #e0e0e0;
    position: relative;
    background: #f0f0f0;
  }

  .ref-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .ref-caption {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 4px 7px;
  }

  .sections-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .section-block {
    background: #fff;
    border: 1px solid #ebebeb;
    border-radius: 10px;
    padding: 14px 16px;
  }

  .section-block.full { grid-column: 1 / -1; }

  .section-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #bbb;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #f0f0f0;
  }

  .section-text {
    font-size: 12.5px;
    font-weight: 400;
    color: #555;
    line-height: 1.8;
    white-space: pre-wrap;
  }

  .section-text b, .section-text strong {
    font-weight: 600;
    color: #222;
  }

  .legenda-block {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-left: 3px solid #111;
    border-radius: 10px;
    padding: 16px 18px;
    font-size: 13px;
    font-weight: 400;
    color: #333;
    line-height: 1.9;
    white-space: pre-wrap;
  }

  .script-block {
    background: #f7f9ff;
    border: 1px solid #dce8ff;
    border-left: 3px solid #3b6fd4;
    border-radius: 10px;
    padding: 16px 18px;
    font-size: 12.5px;
    font-weight: 400;
    color: #3a4a6a;
    line-height: 1.85;
    white-space: pre-wrap;
  }

  .ref-section-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #bbb;
    margin-bottom: 10px;
  }

  @media (max-width: 640px) {
    .sections-grid { grid-template-columns: 1fr; }
    .post-header { grid-template-columns: 32px 1fr auto auto; }
    .post-date { display: none; }
    .format-pill { display: none; }
    h1 { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<div class="page-header">
  <p class="eyebrow">Studio Borges · @kayllaneborgesdesin · Mês 1</p>
  <h1>Calendário editorial completo</h1>
  <p class="subtitle">12 posts com objetivo, orientações de produção, referências visuais, roteiro e legenda pronta. Clique para expandir cada post.</p>
  <div class="legend">
    <span class="tag tag-cilios">Cílios</span>
    <span class="tag tag-rel">Relacionamento</span>
    <span class="tag tag-aut">Autoridade</span>
    <span class="tag tag-svc">Serviços</span>
    <span class="tag tag-bast">Bastidores</span>
  </div>
</div>

<div class="main" id="main"></div>

<script>
const posts = [
  {
    num:"01", date:"Dia 02 · seg", title:"Apresentação da Kayllane", formato:"Foto", tag:"tag-rel", tagLabel:"Relacionamento",
    objetivo:"Criar o primeiro ponto de conexão com quem ainda não conhece a Kayllane. O post precisa mostrar quem ela é antes de mostrar o que ela faz. A pessoa que chega no perfil pela primeira vez precisa sentir que ela é real, acolhedora e confiante.",
    producao:`TIPO: Foto estática

CENÁRIO: Studio arrumado ao fundo, maca visível mas sem bagunça. Kayllane posicionada levemente à frente, centralizada ou levemente deslocada pra um lado.

EXPRESSÃO E POSTURA: Sorriso leve, não forçado. Olhar direto pra câmera. Postura ereta, mãos soltas. Pode segurar um café ou apoiar no braço da cadeira.

LUZ: Luz natural pela frente ou anel de luz difuso. Evitar sombra pesada no rosto.

ROUPA: Uniforme ou a roupa que ela usa no studio. Nada muito informal.

ÂNGULO: Câmera na altura dos olhos ou levemente acima. Retrato 4x5, vertical, corte na cintura pra cima.`,
    refs:[
      { url:"https://images.unsplash.com/photo-1580489944761-15a19d654956?w=300&h=300&fit=crop&crop=face", label:"Expressão e olhar" },
      { url:"https://images.unsplash.com/photo-1560066984-138dadb4c035?w=300&h=300&fit=crop", label:"Estúdio ao fundo" },
      { url:"https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?w=300&h=300&fit=crop", label:"Enquadramento 4x5" }
    ],
    roteiro:null,
    legenda:`Se você chegou aqui agora, deixa eu me apresentar.\n\nSou a Kayllane, especialista em extensão de cílios e sobrancelhas aqui em Feira de Santana. Trabalho sozinha, em espaço próprio, e é exatamente assim que eu gosto. Porque quando você chega aqui, toda a minha atenção é só sua.\n\nNão tem pressa, não tem distração. Tem cuidado de verdade, do começo ao fim.\n\nSe você ainda não me conhece, que bom que chegou até aqui. E se você já é cliente, sabe exatamente do que eu tô falando 🤍\n\nMe conta nos comentários: como você me encontrou?`
  },
  {
    num:"02", date:"Dia 05 · qui", title:"Resultado de cílios — fio a fio", formato:"Foto", tag:"tag-cilios", tagLabel:"Cílios",

    producao:`TIPO: Foto estática

CENÁRIO: Close no olho da cliente. Fundo neutro ou desfocado.

ÂNGULO: Levemente de lado (45 graus) ou frontal com olho aberto e olhar levemente pra cima. Câmera bem próxima, foco nos cílios.

LUZ: Boa nos cílios, sem reflexo excessivo na pele. Anel de luz funciona bem para esse close.

EXECUÇÃO: Tirar a foto antes da cliente sair da maca. Pedir pra ela abrir os olhos naturalmente, sem forçar. Modo retrato no celular funciona bem. Evitar flash direto.`,
    refs:[
      { url:"https://images.unsplash.com/photo-1631730486784-74757d38e388?w=300&h=300&fit=crop", label:"Close nos cílios" },
      { url:"https://images.unsplash.com/photo-1616683693504-3ea7e9ad6fec?w=300&h=300&fit=crop", label:"Luz e foco" },
      { url:"https://images.unsplash.com/photo-1583241800698-e8ab01830a63?w=300&h=300&fit=crop", label:"Ângulo lateral" }
    ],
    roteiro:null,
    legenda:`Esse olhar aqui saiu do studio hoje cedo e eu precisava mostrar pra vocês 🤍\n\nExtensão de cílios fio a fio, feita com calma e atenção em cada detalhe. Porque não tem como entregar um resultado assim com pressa.\n\nSe você ainda não experimentou, me manda uma mensagem. Tenho vagas essa semana e mal posso esperar pra te mostrar o que seus cílios são capazes de ser.\n\n👇 Link na bio pra agendar.`
  },
  {
    num:"03", date:"Dia 08 · seg", title:"Mitos e verdades sobre extensão de cílios", formato:"Carrossel", tag:"tag-aut", tagLabel:"Autoridade",
    objetivo:"Posicioná-la como especialista que educa, não só que vende. Conteúdo com alto potencial de salvar e compartilhar, o que amplia o alcance orgânico.",

SLIDES 2 a 6: Um mito por slide. Estrutura: ícone de erro + texto do mito, linha divisória, ícone de check + verdade. Layout limpo, sem excesso de texto.

SLIDE FINAL (7): Foto da Kayllane + CTA para o direct.

PALETA: Fundo escuro, texto claro, detalhe em dourado. Consistente com a identidade visual existente.`,
    refs:[
      { url:"https://images.unsplash.com/photo-1611532736597-de2d4265fba3?w=300&h=300&fit=crop", label:"Estilo capa carrossel" },
      { url:"https://images.unsplash.com/photo-1586281380349-632531db7ed4?w=300&h=300&fit=crop", label:"Layout slide educativo" },
      { url:"https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=300&h=300&fit=crop", label:"Slide de encerramento" }
    ],
    roteiro:`SLIDE 1 — CAPA
"Mitos e verdades sobre extensão de cílios"

SLIDE 2
❌ MITO: "Extensão de cílios cai o fio natural"
✓ VERDADE: Quando feita com técnica correta e mapeamento adequado, a extensão não prejudica o fio natural. O que machuca é peso errado, cola de baixa qualidade ou profissional sem preparo.

SLIDE 3
❌ MITO: "Extensão dura só uma semana"

SLIDE 4
❌ MITO: "Não precisa de retoque se ainda tiver cílio"

SLIDE 5
❌ MITO: "Volume russo é pesado demais"

SLIDE 6
❌ MITO: "Qualquer profissional entrega o mesmo resultado"
✓ VERDADE: Técnica, materiais e atenção fazem toda a diferença no resultado e na saúde do seu fio natural.

SLIDE 7 — ENCERRAMENTO
[Foto da Kayllane]
"Ficou com alguma dúvida? Me manda no direct, respondo todas 💬"
@kayllaneborgesdesin`,
    legenda:`Você já ouviu que extensão de cílios cai o cílio natural? Que estraga o olho? Que não dura nada?\n\nDeixa eu te contar a verdade de quem trabalha com isso todos os dias.\n\nDesliza pra ver o que é mito e o que é verdade de verdade sobre a extensão de cílios 👉\n\nTem alguma dúvida que você sempre quis tirar? Me manda nos comentários que eu respondo todas.`

    producao:`TIPO: Foto estática OU Reels de 15 a 20 segundos

SE FOR REELS — SEQUÊNCIA DE CENAS:

    refs:[

      { url:"https://images.unsplash.com/photo-1540555700478-4be289fbecef?w=300&h=300&fit=crop", label:"Ambiente do studio" },

    legenda:`Esse é o espaço onde a mágica acontece todos os dias 🤍\n\nCada detalhe aqui foi pensado pra que você se sinta bem desde o momento que entra. Porque pra mim, a experiência começa muito antes de eu pegar nos seus cílios.\n\nVocê já veio me visitar aqui? Se ainda não veio, tô te esperando 📍 Feira de Santana, BA.`

  {

    producao:`TIPO: Print de conversa de direct ou WhatsApp (com autorização) OU card criado com o depoimento

      { url:"https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=300&h=300&fit=crop", label:"Card de depoimento" },

      { url:"https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=300&h=300&fit=crop", label:"Estilo aspas" }

    roteiro:null,
    legenda:`Receber um feedback assim é o que me faz querer fazer ainda melhor a cada atendimento 🤍\n\nNão existe recompensa maior do que saber que a cliente saiu daqui se sentindo bem, não só com o resultado, mas com toda a experiência.\n\nEsse é o tipo de relação que eu quero construir com cada pessoa que passa por aqui.\n\nSe você já foi atendida aqui no studio e quiser compartilhar sua experiência, me manda mensagem. Adoro saber como você se sentiu 💬`

      { url:"https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=300&h=300&fit=crop", label:"Ambiente matinal" },
      { url:"https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=300&h=300&fit=crop&crop=face", label:"Expressão natural" }
    ],
    roteiro:`FALA SUGERIDA EM VOZ OFF:

"Todo dia começo assim. Chego antes de todo mundo, abro o studio no meu ritmo, preparo um café e fico um pouco com esse silêncio antes de tudo começar.

(Duração aproximada: 15 a 18 segundos)`,
    legenda:`Todo dia começo assim. Café, studio e a cabeça já pensando nas clientes que chegam logo mais.\n\nTrabalhar sozinha é uma escolha que faço todos os dias porque acredito que é assim que consigo entregar o melhor. Com presença total, sem dividir atenção.\n\nCada cliente que entra aqui sabe que aquele momento é dela. Completamente.\n\nVocê já parou pra pensar no quanto um atendimento assim faz diferença? Me conta 💬`

    refs:[
      { url:"https://images.unsplash.com/photo-1594736797933-d0501ba2fe65?w=300&h=300&fit=crop", label:"Sobrancelha definida" },

const main = document.getElementById('main');
posts.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'post-card';
  const hasRoteiro = p.roteiro !== null;

  const refsHtml = `
    <div>
      <div class="ref-section-label">Referências visuais</div>
      <div class="ref-strip">
        ${p.refs.map(r => `
          <div class="ref-img-wrap">
            <img src="${r.url}" alt="${r.label}" loading="lazy" onerror="this.parentElement.style.background='#f0f0f0'">
            <div class="ref-caption">${r.label}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  card.innerHTML = `
    <div class="post-header" onclick="toggle(${i})">
      <span class="post-num">${p.num}</span>
      <span class="post-date">${p.date}</span>
      <span class="post-title">${p.title}</span>
      <span class="tag ${p.tag}">${p.tagLabel}</span>
      <span class="format-pill">${p.formato}</span>
      <span class="toggle-btn" id="btn-${i}">↓</span>
    </div>
    <div class="post-body" id="body-${i}">
      ${refsHtml}
      <div class="sections-grid">
        <div class="section-block">
          <div class="section-label">Objetivo do post</div>
          <div class="section-text">${p.objetivo}</div>
        </div>
        <div class="section-block">
          <div class="section-label">Como produzir</div>
          <div class="section-text">${p.producao}</div>
        </div>
        ${hasRoteiro ? `
        <div class="section-block full">
          <div class="section-label">Roteiro</div>
          <div class="script-block">${p.roteiro}</div>
        </div>` : ''}
        <div class="section-block full">
          <div class="section-label">Legenda pronta</div>
          <div class="legenda-block">${p.legenda}</div>
        </div>
      </div>
    </div>
  `;
  main.appendChild(card);
});

function toggle(i) {
  const body = document.getElementById('body-' + i);
  const btn = document.getElementById('btn-' + i);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  btn.textContent = isOpen ? '↓' : '↑';
}
</script>
